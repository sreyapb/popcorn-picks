<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create Account — Popcorn Picks</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <main>
    <header>
      <h1>Popcorn Picks</h1>
    </header>

    <div class="auth-card">
      <h2>Create account</h2>
      <div class="message hidden" id="message"></div>

      <div class="input-group">
        <input id="username" placeholder="Username" autocomplete="username" />
        <input id="email" type="email" placeholder="Email" autocomplete="email" />
        <input id="password" type="password" placeholder="Password" autocomplete="new-password" />
      </div>

      <div class="input-group">
        <button class="primary" onclick="register()">Create account</button>
        <button onclick="window.location.href='login.html'">Already have an account</button>
      </div>
    </div>
  </main>

  <script src="js/register.js"></script>
</body>
</html>
